<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Tonkeeper P2P</title>
    
    <!-- Telegram Mini App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <!-- ===== LANGUAGE OVERLAY ===== -->
    <div class="language-overlay" id="languageOverlay">
        <div class="language-overlay-content">
            <div class="logo-icon">⚡</div>
            <h1>Tonkeeper P2P</h1>
            <p>Выберите язык</p>
            <div class="language-grid">
                <button class="lang-btn" onclick="window.setLanguage('ru')">🇷🇺 Русский</button>
                <button class="lang-btn" onclick="window.setLanguage('en')">🇬🇧 English</button>
                <button class="lang-btn" onclick="window.setLanguage('zh')">🇨🇳 中文</button>
                <button class="lang-btn" onclick="window.setLanguage('ar')">🇸🇦 العربية</button>
            </div>
        </div>
    </div>

    <!-- ===== APP CONTAINER ===== -->
    <div id="app">
        
        <!-- HEADER -->
        <header class="header">
            <div class="header-left">
                <div class="logo">⚡</div>
                <span class="title">Tonkeeper <span>P2P</span></span>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <span class="username" id="userName">👤</span>
                    <span class="balance-badge" id="userBalance">0</span>
                </div>
                <div class="online-badge">
                    <span class="dot"></span>
                    <span id="onlineCount">0</span>
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main id="main-content">
            <!-- Pages rendered by router -->
        </main>

        <!-- BOTTOM NAVIGATION -->
        <nav class="bottom-nav" id="bottomNav">
            <button class="nav-item active" data-page="main">
                <i class="fas fa-home"></i>
                <span>Главная</span>
            </button>
            <button class="nav-item" data-page="deals">
                <i class="fas fa-list-ul"></i>
                <span>Сделки</span>
            </button>
            <button class="nav-item" data-page="create">
                <i class="fas fa-plus-circle"></i>
                <span>Создать</span>
            </button>
            <button class="nav-item" data-page="balance">
                <i class="fas fa-wallet"></i>
                <span>Баланс</span>
            </button>
            <button class="nav-item" data-page="profile">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </button>
        </nav>

    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <button class="modal-close" onclick="window.closeModal()">
                <i class="fas fa-times"></i>
            </button>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- ===== TOAST CONTAINER ===== -->
    <div id="toast-container"></div>

    <!-- ===== SCRIPTS ===== -->
    <script src="js/helpers.js"></script>
    <script src="js/api.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/balance.js"></script>
    <script src="js/deals.js"></script>
    <script src="js/reviews.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
